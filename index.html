<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hulerum</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .screen-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #f4f4f4;
            transition: opacity 0.5s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .homepage-content {
            background-color: #fff;
            padding: 50px 80px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .app-button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.5em;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .app-button:hover {
            background-color: #0056b3;
        }

        #login-form-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            padding: 50px 80px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #login-form-content input {
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 250px;
        }

        #login-button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
        }

        #error-message {
            color: #dc3545;
            font-size: 0.9em;
        }

        #logout-button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="screen-container">
        <div id="login-form-content">
            <h1>Giriş Yap</h1>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button id="login-button">Giriş Yap</button>
            <p id="error-message" class="hidden"></p>
        </div>
    </div>
    
    <div id="main-screen" class="screen-container hidden">
        <div class="homepage-content">
            <h1>HOŞ GELDİN</h1>
            <div class="button-group">
                <a href="./yaz-boz/index.html" class="app-button">YAZ-BOZ</a>
                <a href="./zettel/index.html" class="app-button">ZETTEL</a>
            </div>
            <button id="logout-button">Çıkış Yap</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginScreen = document.getElementById('login-screen');
            const mainScreen = document.getElementById('main-screen');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginButton = document.getElementById('login-button');
            const logoutButton = document.getElementById('logout-button');
            const errorMessage = document.getElementById('error-message');
        
            const validUsername = 'DaUser';
            const validPassword = 'remuser2569';
        
            const checkLoginState = () => {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                if (isLoggedIn) {
                    loginScreen.classList.add('hidden');
                    mainScreen.classList.remove('hidden');
                    usernameInput.value = '';
                    passwordInput.value = '';
                } else {
                    loginScreen.classList.remove('hidden');
                    mainScreen.classList.add('hidden');
                }
            };
        
            loginButton.addEventListener('click', () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
        
                if (username === validUsername && password === validPassword) {
                    localStorage.setItem('isLoggedIn', 'true');
                    errorMessage.classList.add('hidden');
                    checkLoginState();
                } else {
                    errorMessage.textContent = 'Kullanıcı adı veya şifre hatalı!';
                    errorMessage.classList.remove('hidden');
                }
            });
        
            logoutButton.addEventListener('click', () => {
                    localStorage.setItem('isLoggedIn', 'false');
                    checkLoginState();
                    usernameInput.value = '';
                    passwordInput.value = '';
            });
        
            checkLoginState();
        });
    </script>
</body>
</html>
