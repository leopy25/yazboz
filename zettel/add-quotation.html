<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alıntı Ekle/Düzenle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .quotation-area {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 15px;
        }

        button, a.button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        button.delete {
            background-color: #dc3545;
        }

        button.edit {
            background-color: #ffc107;
            color: black;
        }

        .keyword-popup {
            position: absolute;
            background-color: white;
            border: 1px solid #ddd;
            padding: 5px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }

        .quotation-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #fafafa;
        }
        
        .quotation-card p {
            margin: 0;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .quotation-card .actions {
            text-align: right;
        }

        #view-quotation-section {
            display: none;
        }

        #add-edit-form-section {
            display: none;
        }
        
        .keyword-link {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alıntı İşlemleri</h1>
        <p>Materyal R-Kodu: <strong id="rCodeDisplay"></strong></p>

        <div id="view-quotation-section">
            <div id="quotation-container"></div>
            <button onclick="copyQuotation()">Alıntıyı Kopyala</button>
            <button onclick="finishViewing()">Bitti</button>
        </div>

        <div id="add-edit-form-section">
            <div id="quotation-list-container"></div>
            <h2>Yeni Alıntı Ekle</h2>
            <div class="form-group">
                <label for="pageNumber">Sayfa Numarası:</label>
                <input type="text" id="pageNumber">
            </div>
            <div class="form-group">
                <label for="quotationText">Alıntı:</label>
                <div id="quotationText" class="quotation-area" contenteditable="true"></div>
            </div>
            <button id="saveButton" onclick="saveQuotation()">Kaydet</button>
            <button onclick="finishEditing()">Bitti</button>

            <div id="keywordPopup" class="keyword-popup">
                <button onclick="addKeyword()">Anahtar Kelime Ekle</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rCode = urlParams.get('rCode');
        const quotIndex = urlParams.get('quotIndex');
        
        document.getElementById('rCodeDisplay').innerText = rCode;

        const materials = JSON.parse(localStorage.getItem('materials')) || [];
        const material = materials.find(mat => mat['R-Kod'] === rCode);
        
        let editingIndex = null;
        let currentQuotation = null;

        const pageNumberInput = document.getElementById('pageNumber');
        const quotationTextElement = document.getElementById('quotationText');
        const keywordPopup = document.getElementById('keywordPopup');
        const saveButton = document.getElementById('saveButton');
        let selectedText = '';
        let keywords = JSON.parse(localStorage.getItem('keywords')) || [];

        // Kelime kökü bulma fonksiyonu (basit bir örnek)
        function findStem(word) {
            word = word.toLowerCase();
            const suffixes = ['leri', 'ler', 'lar', 'in', 'un', 'in', 'un', 'den', 'dan', 'a', 'e', 'si', 'ci', 'ciği', 'cığı', 'mak', 'mek'];
            for (const suffix of suffixes) {
                if (word.endsWith(suffix)) {
                    return word.slice(0, -suffix.length);
                }
            }
            return word;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (quotIndex !== null) {
                document.getElementById('view-quotation-section').style.display = 'block';
                if (material && material['Alıntılar'] && material['Alıntılar'][quotIndex]) {
                    currentQuotation = material['Alıntılar'][quotIndex];
                    renderSingleQuotation(currentQuotation);
                } else {
                    document.getElementById('quotation-container').innerHTML = '<p>Alıntı bulunamadı.</p>';
                }
            } else {
                document.getElementById('add-edit-form-section').style.display = 'block';
                renderAllQuotations();
            }
        });
        
        quotationTextElement.addEventListener('mouseup', function(e) {
            const selection = window.getSelection();
            selectedText = selection.toString().trim();
            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0).getBoundingClientRect();
                keywordPopup.style.display = 'block';
                keywordPopup.style.top = `${e.pageY + 10}px`;
                keywordPopup.style.left = `${e.pageX}px`;
            } else {
                keywordPopup.style.display = 'none';
            }
        });

        // Alıntıları HTML formatında linkleyen fonksiyon
        function applyKeywords(text) {
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            let tempText = tempDiv.innerText;

            keywords.forEach(keyword => {
                const stem = findStem(keyword);
                const regex = new RegExp(`(?![^<]*>)\\b(${stem}\\w*)\\b`, 'gi');
                tempText = tempText.replace(regex, `<span class="keyword-link" data-keyword="${keyword}">$1</span>`);
            });
            tempDiv.innerHTML = tempText;
            return tempDiv.innerHTML;
        }

        // Sadece tek bir alıntıyı gösteren fonksiyon (haritadan gelenler için)
        function renderSingleQuotation(quotation) {
            const container = document.getElementById('quotation-container');
            container.innerHTML = `
                <div class="quotation-card">
                    <p><strong>Sayfa:</strong> [${quotation.sayfa}]</p>
                    <p>${applyKeywords(quotation.metin)}</p>
                </div>
            `;
        }

        // Tüm alıntıları listeleyen fonksiyon (listeden gelenler için)
        function renderAllQuotations() {
            const container = document.getElementById('quotation-list-container');
            container.innerHTML = '<h2>Mevcut Alıntılar</h2>';
            if (material && material['Alıntılar']) {
                material['Alıntılar'].forEach((q, index) => {
                    const card = document.createElement('div');
                    card.className = 'quotation-card';
                    card.innerHTML = `
                        <p><strong>Sayfa:</strong> [${q.sayfa}]</p>
                        <p>${applyKeywords(q.metin)}</p>
                        <div class="actions">
                            <button onclick="editQuotation(${index})" class="edit">Düzenle</button>
                            <button onclick="deleteQuotation(${index})" class="delete">Sil</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }
        
        function addKeyword() {
            const selection = window.getSelection();
            const range = selection.getRangeAt(0);
            
            if (selectedText.length > 0) {
                const stem = findStem(selectedText);
                
                const newSpan = document.createElement('span');
                newSpan.className = 'keyword-link';
                newSpan.dataset.keyword = selectedText;
                newSpan.textContent = selectedText;

                range.deleteContents();
                range.insertNode(newSpan);
                keywordPopup.style.display = 'none';

                if (!keywords.includes(stem)) {
                    keywords.push(stem);
                    localStorage.setItem('keywords', JSON.stringify(keywords));
                }
            }
        }
        
        function saveQuotation() {
            const pageNumber = pageNumberInput.value;
            let quotationContent = quotationTextElement.innerHTML;

            quotationContent = quotationContent.replace(/<span class="keyword-link" data-keyword="(.*?)".*?>(.*?)<\/span>/g, `<a href="#" data-keyword="$1">$2</a>`);

            if (material) {
                const quotationData = {
                    "sayfa": pageNumber,
                    "metin": quotationContent
                };

                if (editingIndex !== null) {
                    material['Alıntılar'][editingIndex] = quotationData;
                    alert(`Alıntı başarıyla güncellendi.`);
                    editingIndex = null;
                    saveButton.innerText = "Kaydet";
                } else {
                    if (!material['Alıntılar']) {
                        material['Alıntılar'] = [];
                    }
                    material['Alıntılar'].push(quotationData);
                    alert(`Yeni alıntı kaydedildi.`);
                }
                localStorage.setItem('materials', JSON.stringify(materials));
            }

            pageNumberInput.value = '';
            quotationTextElement.innerHTML = '';
            renderAllQuotations();
        }

        function editQuotation(index) {
            editingIndex = index;
            const quotationToEdit = material['Alıntılar'][index];

            pageNumberInput.value = quotationToEdit.sayfa;
            quotationTextElement.innerHTML = quotationToEdit.metin.replace(/<a href="#" data-keyword="(.*?)">(.*?)<\/a>/g, `<span class="keyword-link" data-keyword="$1">$2</span>`);
            
            saveButton.innerText = "Güncelle";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteQuotation(index) {
            if (confirm("Bu alıntıyı silmek istediğinizden emin misiniz?")) {
                material['Alıntılar'].splice(index, 1);
                localStorage.setItem('materials', JSON.stringify(materials));
                renderAllQuotations();
                if (editingIndex === index) {
                    pageNumberInput.value = '';
                    quotationTextElement.innerHTML = '';
                    editingIndex = null;
                    saveButton.innerText = "Kaydet";
                }
            }
        }

        function copyQuotation() {
            if (currentQuotation) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = currentQuotation.metin;
                const cleanText = tempDiv.innerText || tempDiv.textContent;

                const textToCopy = `${cleanText} (${rCode}, ${currentQuotation.sayfa})`;
                
                navigator.clipboard.writeText(textToCopy)
                    .then(() => {
                        alert('Alıntı panoya kopyalandı!');
                    })
                    .catch(err => {
                        console.error('Kopyalama hatası:', err);
                    });
            }
        }

        function finishViewing() {
            window.location.href = 'list.html';
        }

        function finishEditing() {
            window.location.href = 'list.html';
        }
    </script>
</body>
</html>
