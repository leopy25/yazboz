<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alıntı Düzenle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .quotation-area {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 15px;
        }

        button, a.button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        button.delete {
            background-color: #dc3545;
        }

        button.update {
            background-color: #28a745;
        }

        .keyword-popup {
            position: absolute;
            background-color: white;
            border: 1px solid #ddd;
            padding: 5px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }
        
        .keyword-link {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alıntı Düzenle</h1>
        <p>Materyal R-Kodu: <strong id="rCodeDisplay"></strong></p>

        <div class="form-group">
            <label for="pageNumber">Sayfa Numarası:</label>
            <input type="text" id="pageNumber">
        </div>
        
        <div class="form-group">
            <label for="quotationText">Alıntı:</label>
            <div id="quotationText" class="quotation-area" contenteditable="true"></div>
        </div>
        
        <button onclick="updateQuotation()" class="update">Güncelle</button>
        <button onclick="finishEditing()">Vazgeç</button>

        <div id="keywordPopup" class="keyword-popup">
            <button onclick="addKeyword()">Anahtar Kelime Ekle</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rCode = urlParams.get('rCode');
        const quotIndex = urlParams.get('quotIndex');
        
        document.getElementById('rCodeDisplay').innerText = rCode;

        const pageNumberInput = document.getElementById('pageNumber');
        const quotationTextElement = document.getElementById('quotationText');
        const keywordPopup = document.getElementById('keywordPopup');
        
        let selectedText = '';
        let keywords = JSON.parse(localStorage.getItem('keywords')) || [];

        function findStem(word) {
            word = word.toLowerCase();
            const suffixes = ['leri', 'ler', 'lar', 'in', 'un', 'in', 'un', 'den', 'dan', 'a', 'e', 'si', 'ci', 'ciği', 'cığı', 'mak', 'mek'];
            for (const suffix of suffixes) {
                if (word.endsWith(suffix)) {
                    return word.slice(0, -suffix.length);
                }
            }
            return word;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/get-materials', { method: 'GET' })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => { throw new Error(text) });
                    }
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        const materials = data;
                        const material = materials.find(mat => mat['R-Kod'] === rCode);

                        if (material && material['Alıntılar'] && material['Alıntılar'][quotIndex]) {
                            const quotationToEdit = material['Alıntılar'][quotIndex];
                            pageNumberInput.value = quotationToEdit.sayfa;
                            quotationTextElement.innerHTML = quotationToEdit.metin.replace(/<a href="#" data-keyword="(.*?)">(.*?)<\/a>/g, `<span class="keyword-link" data-keyword="$1">$2</span>`);
                        } else {
                            alert("Düzenlenecek alıntı bulunamadı.");
                            window.location.href = 'list.html';
                        }
                    } else {
                        alert("Veriler yüklenirken bir hata oluştu: " + data.message);
                        window.location.href = 'list.html';
                    }
                })
                .catch(error => {
                    console.error('API isteğinde hata:', error);
                    alert("Veriler yüklenirken bir hata oluştu: " + error.message);
                    window.location.href = 'list.html';
                });
        });
        
        quotationTextElement.addEventListener('mouseup', function(e) {
            const selection = window.getSelection();
            selectedText = selection.toString().trim();
            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0).getBoundingClientRect();
                keywordPopup.style.display = 'block';
                keywordPopup.style.top = `${e.pageY + 10}px`;
                keywordPopup.style.left = `${e.pageX}px`;
            } else {
                keywordPopup.style.display = 'none';
            }
        });

        function addKeyword() {
            const selection = window.getSelection();
            selectedText = selection.toString().trim();
            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0).getClientRects()[0];
                keywordPopup.style.display = 'block';
                keywordPopup.style.top = `${range.bottom + window.scrollY}px`;
                keywordPopup.style.left = `${range.left + window.scrollX}px`;
            } else {
                keywordPopup.style.display = 'none';
            }
            
            const newSpan = document.createElement('span');
            newSpan.className = 'keyword-link';
            newSpan.dataset.keyword = selectedText;
            newSpan.textContent = selectedText;

            const range = window.getSelection().getRangeAt(0);
            range.deleteContents();
            range.insertNode(newSpan);
            keywordPopup.style.display = 'none';

            const stem = findStem(selectedText);
            if (!keywords.includes(stem)) {
                keywords.push(stem);
                localStorage.setItem('keywords', JSON.stringify(keywords));
            }
        }
        
        function updateQuotation() {
            fetch('/api/get-materials', { method: 'GET' })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => { throw new Error(text) });
                    }
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        const materials = data;
                        const material = materials.find(mat => mat['R-Kod'] === rCode);

                        if (material) {
                            const pageNumber = pageNumberInput.value;
                            let quotationContent = quotationTextElement.innerHTML;

                            quotationContent = quotationContent.replace(/<span class="keyword-link" data-keyword="(.*?)".*?>(.*?)<\/span>/g, `<a href="#" data-keyword="$1">$2</a>`);
                            
                            const quotationData = {
                                "sayfa": pageNumber,
                                "metin": quotationContent
                            };

                            material['Alıntılar'][quotIndex] = quotationData;

                            fetch('/api/save-material', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(material),
                            })
                            .then(response => {
                                if (!response.ok) {
                                    return response.text().then(text => { throw new Error(text) });
                                }
                                return response.json();
                            })
                            .then(updateResult => {
                                if (updateResult.success) {
                                    alert(`Alıntı başarıyla güncellendi.`);
                                    window.location.href = `add-quotation.html?rCode=${rCode}&mode=edit`;
                                } else {
                                    alert('Güncelleme hatası: ' + updateResult.message);
                                }
                            })
                            .catch(error => {
                                console.error('API isteğinde hata:', error);
                                alert('Güncelleme isteği sırasında bir hata oluştu: ' + error.message);
                            });
                        } else {
                            alert("Materyal bulunamadı.");
                        }
                    } else {
                        alert("Veriler yüklenirken bir hata oluştu: " + data.message);
                    }
                })
                .catch(error => {
                    console.error('API isteğinde hata:', error);
                    alert("Veriler yüklenirken bir hata oluştu: " + error.message);
                });
        }

        function finishEditing() {
            window.location.href = 'list.html';
        }
    </script>
</body>
</html>
