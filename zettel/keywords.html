<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anahtar Kelime Haritası</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            text-align: center;
        }
        
        a.button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            border-radius: 4px;
        }

        #keyword-map-wrapper {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            overflow: hidden;
            cursor: grab;
            position: relative;
        }

        #keyword-map {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #fff;
            transform-origin: 50% 50%;
            transition: transform 0.1s ease-out;
        }

        .keyword-node {
            position: absolute;
            width: auto;
            padding: 5px 10px;
            border-radius: 50px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 10;
        }
        
        .quotation-point {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #dc3545;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 5;
        }

        /* SVG çizgileri için stil */
        #connection-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .connection-line {
            stroke: #999;
            stroke-width: 1;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="button">Materyal Ekleme Sayfası</a>
        <h1>Anahtar Kelime Haritası</h1>
        <div id="keyword-map-wrapper">
            <div id="keyword-map">
                <svg id="connection-lines"></svg>
            </div>
        </div>
    </div>
    <script>
        let materials = [];
        let keywords = [];
        const keywordPositions = JSON.parse(localStorage.getItem('keywordPositions')) || {};

        const mapWrapper = document.getElementById('keyword-map-wrapper');
        const map = document.getElementById('keyword-map');
        
        const mapWidth = mapWrapper.offsetWidth;
        const mapHeight = mapWrapper.offsetHeight;
        
        let currentScale = 1;

        function findStem(word) {
            word = word.toLowerCase();
            const suffixes = ['leri', 'ler', 'lar', 'in', 'un', 'in', 'un', 'den', 'dan', 'a', 'e', 'si', 'ci', 'ciği', 'cığı', 'mak', 'mek'];
            for (const suffix of suffixes) {
                if (word.endsWith(suffix)) {
                    return word.slice(0, -suffix.length);
                }
            }
            return word;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchMaterialsAndRenderMap();
        });

        function fetchMaterialsAndRenderMap() {
            fetch('/api/get-materials.js', { method: 'GET' })
                .then(response => response.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        materials = data;
                        let allKeywords = [];
                        materials.forEach(material => {
                            if (material['Alıntılar']) {
                                material['Alıntılar'].forEach(quotation => {
                                    const quotationText = quotation.metin.replace(/<[^>]*>/g, '');
                                    const words = quotationText.split(/\s+/);
                                    words.forEach(word => {
                                        const stem = findStem(word);
                                        if (stem.length > 2 && !allKeywords.includes(stem)) {
                                            allKeywords.push(stem);
                                        }
                                    });
                                });
                            }
                        });
                        keywords = allKeywords;
                        localStorage.setItem('keywords', JSON.stringify(keywords));
                        renderMap();
                    } else {
                        console.error('Veri çekme hatası:', data.message);
                    }
                })
                .catch(error => {
                    console.error('API isteğinde hata:', error);
                });
        }

        function renderMap() {
            map.innerHTML = '<svg id="connection-lines"></svg>';
            const newSvg = document.getElementById('connection-lines');
            
            const totalKeywords = keywords.length;
            const keywordAngleStep = (2 * Math.PI) / totalKeywords;
            const keywordRadius = Math.min(mapWidth, mapHeight) * 0.3;

            keywords.forEach((keyword, keywordIndex) => {
                let x, y;
                if (keywordPositions[keyword]) {
                    x = keywordPositions[keyword].x;
                    y = keywordPositions[keyword].y;
                } else {
                    const angle = keywordAngleStep * keywordIndex;
                    x = mapWidth / 2 + keywordRadius * Math.cos(angle);
                    y = mapHeight / 2 + keywordRadius * Math.sin(angle);
                }

                const node = document.createElement('div');
                node.className = 'keyword-node';
                node.innerText = keyword;
                node.style.top = `${y}px`;
                node.style.left = `${x}px`;
                node.dataset.keyword = keyword;
                map.appendChild(node);

                addDragEvents(node, keyword);

                const keywordQuotations = [];
                materials.forEach((material, matIndex) => {
                    if (material['Alıntılar']) {
                        material['Alıntılar'].forEach((quotation, quotIndex) => {
                            const stem = findStem(quotation.metin.replace(/<[^>]*>/g, ''));
                            if (stem === findStem(keyword)) {
                                keywordQuotations.push({
                                    rCode: material['R-Kod'],
                                    page: quotation.sayfa,
                                    text: quotation.metin,
                                    matIndex: matIndex,
                                    quotIndex: quotIndex
                                });
                            }
                        });
                    }
                });
                
                const numPoints = keywordQuotations.length;
                if (numPoints > 0) {
                    const pointAngleStep = (2 * Math.PI) / numPoints;
                    const pointRadius = 70;
                    keywordQuotations.forEach((quotation, pointIndex) => {
                        const pointAngle = pointAngleStep * pointIndex;
                        const pointX = x + pointRadius * Math.cos(pointAngle);
                        const pointY = y + pointRadius * Math.sin(pointAngle);
                        
                        const point = document.createElement('div');
                        point.className = 'quotation-point';
                        point.style.top = `${pointY}px`;
                        point.style.left = `${pointX}px`;
                        point.title = `${quotation.rCode}/[${quotation.page}]: ${quotation.text.replace(/<[^>]*>/g, '').substring(0, 100)}...`;
                        
                        point.addEventListener('click', () => {
                            window.location.href = `add-quotation.html?rCode=${quotation.rCode}&quotIndex=${quotation.quotIndex}`;
                        });

                        map.appendChild(point);

                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', x);
                        line.setAttribute('y1', y);
                        line.setAttribute('x2', pointX);
                        line.setAttribute('y2', pointY);
                        line.setAttribute('class', 'connection-line');
                        newSvg.appendChild(line);
                    });
                }
            });
        }

        function addDragEvents(node, keyword) {
            let isDragging = false;
            let startX, startY;

            node.addEventListener('mousedown', (e) => {
                isDragging = true;
                map.style.cursor = 'grabbing';
                const rect = node.getBoundingClientRect();
                const mapRect = map.getBoundingClientRect();
                startX = e.clientX - (rect.left - mapRect.left) / currentScale;
                startY = e.clientY - (rect.top - mapRect.top) / currentScale;
            });

            map.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();

                const mapRect = map.getBoundingClientRect();
                const newX = (e.clientX - mapRect.left) / currentScale;
                const newY = (e.clientY - mapRect.top) / currentScale;
                
                node.style.left = `${newX}px`;
                node.style.top = `${newY}px`;
                
                keywordPositions[keyword] = { x: newX, y: newY };
                localStorage.setItem('keywordPositions', JSON.stringify(keywordPositions));
                
                renderMap();
            });

            map.addEventListener('mouseup', () => {
                isDragging = false;
                map.style.cursor = 'grab';
            });
            map.addEventListener('mouseleave', () => {
                isDragging = false;
                map.style.cursor = 'grab';
            });
        }

        mapWrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const delta = e.deltaY * -0.01;
            const newScale = currentScale + delta;
            
            if (newScale < 0.5 || newScale > 3) {
                return;
            }
            
            currentScale = newScale;
            
            const rect = map.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            map.style.transformOrigin = `${mouseX}px ${mouseY}px`;
            map.style.transform = `scale(${currentScale})`;
        });
    </script>
</body>
</html>
