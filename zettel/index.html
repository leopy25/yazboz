<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materyal Arşivleyici</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            color: #0056b3;
        }

        button, a.button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }

        .section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fafafa;
        }
        
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Materyal Arşivleme Sistemi</h1>
        
        <button id="zettelButton">Zettel'le</button>
        <a href="list.html" class="button">Materyalleri Görüntüle</a>
        <a href="keywords.html" class="button">Anahtar Kelimeler</a>

        <div id="selectionSection" class="section">
            <h2>Materyal Türünü Seçin</h2>
            <button onclick="showForm('scientificArticle')">Bilimsel Makale</button>
            <button onclick="showForm('book')">Kitap</button>
            <button onclick="showForm('bookChapter')">Kitap Bölümü</button>
            <button onclick="showForm('other')">Diğer</button>
        </div>

        <div id="scientificArticleForm" class="section">
            <h2>Bilimsel Makale</h2>
            <div class="form-group"><label>Makale Adı:</label><input type="text" id="saTitle"></div>
            <div class="form-group"><label>Yazar Adı-Soyadı:</label><input type="text" id="saAuthor"></div>
            <div class="form-group"><label>Yayınlandığı Dergi:</label><input type="text" id="saJournal"></div>
            <div class="form-group"><label>Yayınlanma Yılı:</label><input type="text" id="saYear"></div>
            <div class="form-group"><label>DOI:</label><input type="text" id="saDoi"></div>
            <div class="form-group"><label>Sayfa Aralığı:</label><input type="text" id="saPages"></div>
            <div class="form-group">
                <label>Çevirmenin Adı-Soyadı:</label>
                <input type="text" id="saTranslator" oninput="toggleOriginalTitle('saTranslator', 'saOriginalTitleGroup')">
            </div>
            <div id="saOriginalTitleGroup" class="form-group" style="display: none;">
                <label>Eserin Özgün Adı:</label>
                <input type="text" id="saOriginalTitle">
            </div>
            <div class="form-group">
                <label>Manuel R-Kod:</label>
                <input type="text" id="saRCode" placeholder="Boş bırakırsanız otomatik oluşturulur">
            </div>
            <button onclick="saveMaterial('scientificArticle')">Kaydet</button>
        </div>

        <div id="bookForm" class="section">
            <h2>Kitap</h2>
            <div class="form-group"><label>Kitap Adı:</label><input type="text" id="bTitle"></div>
            <div class="form-group"><label>Yazar Adı-Soyadı:</label><input type="text" id="bAuthor"></div>
            <div class="form-group"><label>Yayınevi:</label><input type="text" id="bPublisher"></div>
            <div class="form-group"><label>Yayınlandığı Yıl:</label><input type="text" id="bYear"></div>
            <div class="form-group"><label>Yayınlandığı Yer:</label><input type="text" id="bPlace"></div>
            <div class="form-group">
                <label>Çevirmenin Adı-Soyadı:</label>
                <input type="text" id="bTranslator" oninput="toggleOriginalTitle('bTranslator', 'bOriginalTitleGroup')">
            </div>
            <div id="bOriginalTitleGroup" class="form-group" style="display: none;">
                <label>Eserin Özgün Adı:</label>
                <input type="text" id="bOriginalTitle">
            </div>
            <div class="form-group">
                <label>Manuel R-Kod:</label>
                <input type="text" id="bRCode" placeholder="Boş bırakırsanız otomatik oluşturulur">
            </div>
            <button onclick="saveMaterial('book')">Kaydet</button>
        </div>

        <div id="bookChapterForm" class="section">
            <h2>Kitap Bölümü</h2>
            <div class="form-group"><label>Kitap Adı:</label><input type="text" id="bcBookTitle"></div>
            <div class="form-group"><label>Editörlerin Adı-Soyadı:</label><input type="text" id="bcEditors"></div>
            <div class="form-group"><label>Sorumlu Yazarın Adı:</label><input type="text" id="bcAuthor"></div>
            <div class="form-group"><label>Bölüm Başlığı:</label><input type="text" id="bcChapterTitle"></div>
            <div class="form-group"><label>Sayfa Aralığı:</label><input type="text" id="bcPages"></div>
            <div class="form-group"><label>Yayınevi:</label><input type="text" id="bcPublisher"></div>
            <div class="form-group"><label>Yayınlandığı Yıl:</label><input type="text" id="bcYear"></div>
            <div class="form-group"><label>Yayınlandığı Yer:</label><input type="text" id="bcPlace"></div>
            <div class="form-group">
                <label>Çevirmenin Adı-Soyadı:</label>
                <input type="text" id="bcTranslator" oninput="toggleOriginalTitle('bcTranslator', 'bcOriginalTitleGroup')">
            </div>
            <div id="bcOriginalTitleGroup" class="form-group" style="display: none;">
                <label>Eserin Özgün Adı:</label>
                <input type="text" id="bcOriginalTitle">
            </div>
            <div class="form-group">
                <label>Manuel R-Kod:</label>
                <input type="text" id="bcRCode" placeholder="Boş bırakırsanız otomatik oluşturulur">
            </div>
            <button onclick="saveMaterial('bookChapter')">Kaydet</button>
        </div>

        <div id="otherForm" class="section">
            <h2>Diğer</h2>
            <p>Bu bölüm şimdilik geliştirme aşamasındadır.</p>
            <div class="form-group">
                <label>Manuel R-Kod:</label>
                <input type="text" id="otherRCode" placeholder="Boş bırakırsanız otomatik oluşturulur">
            </div>
            <button onclick="saveMaterial('other')">Kaydet</button>
        </div>
    </div>

    <script>
        document.getElementById('zettelButton').addEventListener('click', function() {
            document.getElementById('selectionSection').style.display = 'block';
            document.querySelectorAll('.section').forEach(section => {
                if (section.id !== 'selectionSection') {
                    section.style.display = 'none';
                }
            });
        });

        function showForm(formId) {
            document.querySelectorAll('.section').forEach(section => {
                if (section.id !== 'selectionSection') {
                    section.style.display = 'none';
                }
            });
            document.getElementById(formId + 'Form').style.display = 'block';
        }

        function toggleOriginalTitle(translatorInputId, originalTitleGroupId) {
            const translatorInput = document.getElementById(translatorInputId);
            const originalTitleGroup = document.getElementById(originalTitleGroupId);
            if (translatorInput.value.trim() !== '') {
                originalTitleGroup.style.display = 'block';
            } else {
                originalTitleGroup.style.display = 'none';
            }
        }

        function saveMaterial(type) {
            let materialData = {};
            let rCodeInputId;

            if (type === 'scientificArticle') {
                rCodeInputId = 'saRCode';
                materialData["Materyal Türü"] = "Bilimsel Makale";
                materialData["Makale Adı"] = document.getElementById('saTitle').value;
                materialData["Yazar Adı-Soyadı"] = document.getElementById('saAuthor').value;
                materialData["Yayınlandığı Dergi"] = document.getElementById('saJournal').value;
                materialData["Yayınlanma Yılı"] = document.getElementById('saYear').value;
                materialData["DOI"] = document.getElementById('saDoi').value;
                materialData["Sayfa Aralığı"] = document.getElementById('saPages').value;
                const translator = document.getElementById('saTranslator').value;
                if (translator) {
                    materialData["Çevirmenin Adı-Soyadı"] = translator;
                    materialData["Eserin Özgün Adı"] = document.getElementById('saOriginalTitle').value;
                }
            } else if (type === 'book') {
                rCodeInputId = 'bRCode';
                materialData["Materyal Türü"] = "Kitap";
                materialData["Kitap Adı"] = document.getElementById('bTitle').value;
                materialData["Yazar Adı-Soyadı"] = document.getElementById('bAuthor').value;
                materialData["Yayınevi"] = document.getElementById('bPublisher').value;
                materialData["Yayınlandığı Yıl"] = document.getElementById('bYear').value;
                materialData["Yayınlandığı Yer"] = document.getElementById('bPlace').value;
                const translator = document.getElementById('bTranslator').value;
                if (translator) {
                    materialData["Çevirmenin Adı-Soyadı"] = translator;
                    materialData["Eserin Özgün Adı"] = document.getElementById('bOriginalTitle').value;
                }
            } else if (type === 'bookChapter') {
                rCodeInputId = 'bcRCode';
                materialData["Materyal Türü"] = "Kitap Bölümü";
                materialData["Kitap Adı"] = document.getElementById('bcBookTitle').value;
                materialData["Editörlerin Adı-Soyadı"] = document.getElementById('bcEditors').value;
                materialData["Sorumlu Yazarın Adı"] = document.getElementById('bcAuthor').value;
                materialData["Bölüm Başlığı"] = document.getElementById('bcChapterTitle').value;
                materialData["Sayfa Aralığı"] = document.getElementById('bcPages').value;
                materialData["Yayınevi"] = document.getElementById('bcPublisher').value;
                materialData["Yayınlandığı Yıl"] = document.getElementById('bcYear').value;
                materialData["Yayınlandığı Yer"] = document.getElementById('bcPlace').value;
                const translator = document.getElementById('bcTranslator').value;
                if (translator) {
                    materialData["Çevirmenin Adı-Soyadı"] = translator;
                    materialData["Eserin Özgün Adı"] = document.getElementById('bcOriginalTitle').value;
                }
            } else if (type === 'other') {
                rCodeInputId = 'otherRCode';
                materialData["Materyal Türü"] = "Diğer";
            }

            let rCode = document.getElementById(rCodeInputId).value.trim();
            if (rCode === '') {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = String(now.getFullYear()).slice(-2);
                const hour = String(now.getHours()).padStart(2, '0');
                const minute = String(now.getMinutes()).padStart(2, '0');
                rCode = `R${day}${month}${year}-${hour}${minute}`;
            }

            materialData["R-Kod"] = rCode;
            materialData["Eklenme Tarihi"] = new Date().toLocaleString('tr-TR');
            materialData["Alıntılar"] = [];

            // Vercel'deki save-material API'sine POST isteği gönder
            fetch('/api/save-material', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(materialData),
            })
            .then(response => response.json())
            .then(result => {
                if(result.success) {
                    alert(`Materyal "${materialData["R-Kod"]}" adıyla başarıyla kaydedildi.`);
                    
                    document.querySelectorAll('input[type="text"]').forEach(input => input.value = '');
                    document.getElementById('selectionSection').style.display = 'none';
                    document.getElementById(type + 'Form').style.display = 'none';
                    
                    window.location.href = 'list.html';
                } else {
                    alert('Hata: ' + result.message);
                }
            })
            .catch(error => {
                console.error('API isteğinde hata:', error);
                alert('İstek sırasında bir hata oluştu.');
            });
        }
    </script>
</body>
</html>
